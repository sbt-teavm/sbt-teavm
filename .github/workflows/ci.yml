on:
  pull_request:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: "ubuntu-22.04"
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        java:
        - 17
        - 25
    steps:
    - uses: actions/checkout@v7
    - uses: sbt/setup-sbt@v1
    - uses: actions/setup-java@v5
      with:
        java-version: "${{matrix.java}}"
        distribution: zulu
        cache: sbt
    - run: sbt
           -v
           --server
           scalafmtSbt
           "+ scalafixAll"
           "+ scalafmtAll"
    - run: git diff --exit-code
    - uses: reviewdog/action-suggester@2558ba17e65a9039e73764a73009fc05fef28a46 # v1.19.0
      if: failure()
      with:
        tool_name: scala
        fail_on_error: true
    - run: node --version
    - run: npm --version
    - run: sbt
           -v
           --server
           "+ test"
           "++ 2.x"
           scripted
